<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Join Class — Nihongo Mentor</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f7; color: #1d1d1f; min-height: 100vh; }
  header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); padding: 20px 32px; display: flex; align-items: center; gap: 16px; }
  .logo { font-size: 32px; }
  header h1 { font-size: 20px; font-weight: 700; color: #fff; }
  header p { font-size: 12px; color: rgba(255,255,255,.6); margin-top: 2px; }
  .container { max-width: 560px; margin: 48px auto; padding: 0 20px; }
  .card { background: #fff; border-radius: 18px; padding: 36px 32px; box-shadow: 0 2px 12px rgba(0,0,0,.08); text-align: center; }
  .invite-icon { font-size: 56px; margin-bottom: 16px; }
  .invite-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
  .invite-sub { font-size: 14px; color: #86868b; line-height: 1.6; margin-bottom: 28px; }
  .cohort-badge { display: inline-block; background: #e8f4fd; color: #1a5276; padding: 6px 16px; border-radius: 20px; font-size: 13px; font-weight: 600; margin-bottom: 28px; }
  .deep-link-btn { display: block; width: 100%; padding: 14px; background: linear-gradient(135deg, #1a1a2e, #0f3460); color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; text-decoration: none; margin-bottom: 12px; }
  .deep-link-btn:hover { opacity: .9; }
  .divider { margin: 24px 0; display: flex; align-items: center; gap: 12px; }
  .divider hr { flex: 1; border: none; border-top: 1px solid #e5e5ea; }
  .divider span { font-size: 11px; color: #86868b; white-space: nowrap; }
  .app-store-links { display: flex; flex-direction: column; gap: 10px; }
  .app-store-row { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: #f5f5f7; border-radius: 10px; text-decoration: none; color: #1d1d1f; }
  .app-store-row:hover { background: #e5e5ea; }
  .app-icon { font-size: 28px; flex-shrink: 0; }
  .app-info { text-align: left; flex: 1; }
  .app-name { font-size: 13px; font-weight: 600; }
  .app-desc { font-size: 11px; color: #86868b; margin-top: 1px; }
  .app-badge { font-size: 11px; font-weight: 600; color: #0f3460; background: #e8f4fd; padding: 2px 8px; border-radius: 6px; flex-shrink: 0; }
  .loading { color: #86868b; font-size: 14px; padding: 40px 0; }
  .error-card { background: #fff9f0; border: 1px solid #ffe0a3; border-radius: 14px; padding: 24px; text-align: center; color: #7a4a00; }
  .error-card strong { display: block; font-size: 16px; margin-bottom: 8px; }
</style>
</head>
<body>

<header>
  <div class="logo">🇯🇵</div>
  <div>
    <h1>Nihongo Mentor</h1>
    <p>Student Invite</p>
  </div>
</header>

<div class="container">
  <div id="content">
    <div class="card">
      <p class="loading">Loading invite details…</p>
    </div>
  </div>
</div>

<script>
const API = 'https://fltusorahxjvsdjaspgy.supabase.co/functions/v1/nihongo-dashboard';

function getParam(name) {
  return new URLSearchParams(window.location.search).get(name);
}

const token = getParam('token');

const APP_STORE_LINKS = {
  kanji: 'https://apps.apple.com/app/id6760374345',
  kiku:  'https://apps.apple.com/app/id6761232956',
  yomu:  'https://apps.apple.com/app/id6743741048',
};

async function loadInvite() {
  const contentEl = document.getElementById('content');

  if (!token) {
    contentEl.innerHTML = `
      <div class="error-card">
        <strong>Invalid Invite Link</strong>
        This link is missing a token. Ask your teacher for a new invite link.
      </div>`;
    return;
  }

  try {
    const res = await fetch(API + '/invite/' + encodeURIComponent(token));
    const data = await res.json();

    if (!res.ok || data.error) {
      contentEl.innerHTML = `
        <div class="error-card">
          <strong>Invite Not Found</strong>
          This invite link may have expired or already been used. Ask your teacher for a new one.
        </div>`;
      return;
    }

    const teacherName = data.teacher_name || 'Your Teacher';
    const cohortName  = data.cohort_name  || 'Japanese Class';
    const jlptTarget  = data.jlpt_target  || null;
    const deepLink    = `nihongomentor://join?token=${encodeURIComponent(token)}`;

    contentEl.innerHTML = `
      <div class="card">
        <div class="invite-icon">🎌</div>
        <div class="invite-title">You're invited!</div>
        <p class="invite-sub">
          <strong>${teacherName}</strong> has invited you to join their class.
        </p>
        <div class="cohort-badge">
          🏫 ${cohortName}${jlptTarget ? ' · ' + jlptTarget : ''}
        </div>

        <a href="${deepLink}" class="deep-link-btn">
          Open in Nihongo Mentor
        </a>
        <p style="font-size:11px;color:#86868b;margin-bottom:0;">
          Tap this button on your iPhone with Nihongo Mentor installed. Your enrollment will be recorded automatically.
        </p>

        <div class="divider">
          <hr>
          <span>Don't have the app yet?</span>
          <hr>
        </div>

        <div class="app-store-links">
          <a href="${APP_STORE_LINKS.kanji}" target="_blank" rel="noopener" class="app-store-row">
            <div class="app-icon">✍️</div>
            <div class="app-info">
              <div class="app-name">Kanji Mentor</div>
              <div class="app-desc">Stroke order, SRS, AI analysis</div>
            </div>
            <span class="app-badge">App Store</span>
          </a>
          <a href="${APP_STORE_LINKS.kiku}" target="_blank" rel="noopener" class="app-store-row">
            <div class="app-icon">🎧</div>
            <div class="app-info">
              <div class="app-name">Kiku Mentor</div>
              <div class="app-desc">Japanese listening comprehension</div>
            </div>
            <span class="app-badge">App Store</span>
          </a>
          <a href="${APP_STORE_LINKS.yomu}" target="_blank" rel="noopener" class="app-store-row">
            <div class="app-icon">📖</div>
            <div class="app-info">
              <div class="app-name">Yomu Mentor</div>
              <div class="app-desc">Japanese reading practice</div>
            </div>
            <span class="app-badge">App Store</span>
          </a>
        </div>
      </div>`;
  } catch(e) {
    contentEl.innerHTML = `
      <div class="error-card">
        <strong>Something went wrong</strong>
        Could not load invite details. Please check your connection and try again.
      </div>`;
  }
}

loadInvite();
</script>
</body>
</html>
