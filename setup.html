<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teacher Setup — Nihongo Mentor</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f7; color: #1d1d1f; min-height: 100vh; }
  header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); padding: 20px 32px; display: flex; align-items: center; gap: 16px; }
  .logo { font-size: 32px; }
  header h1 { font-size: 20px; font-weight: 700; color: #fff; }
  header p { font-size: 12px; color: rgba(255,255,255,.6); margin-top: 2px; }
  .container { max-width: 480px; margin: 48px auto; padding: 0 20px; }
  .card { background: #fff; border-radius: 18px; padding: 36px 32px; box-shadow: 0 2px 12px rgba(0,0,0,.08); }
  .setup-icon { font-size: 48px; text-align: center; margin-bottom: 12px; }
  h2 { font-size: 20px; font-weight: 700; text-align: center; margin-bottom: 6px; }
  .subtitle { font-size: 13px; color: #86868b; text-align: center; margin-bottom: 28px; line-height: 1.5; }
  .field { margin-bottom: 18px; }
  .field label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; color: #86868b; margin-bottom: 6px; }
  .field input, .field select {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid #e5e5ea;
    border-radius: 8px;
    font-size: 14px;
    outline: none;
    font-family: inherit;
    background: #fff;
    color: #1d1d1f;
  }
  .field input:focus, .field select:focus { border-color: #0f3460; }
  .submit-btn {
    width: 100%;
    padding: 12px;
    background: linear-gradient(135deg, #1a1a2e, #0f3460);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
  }
  .submit-btn:hover { opacity: .9; }
  .submit-btn:disabled { opacity: .5; cursor: not-allowed; }
  .err { color: #ff3b30; font-size: 12px; margin-top: 10px; display: none; text-align: center; }
  .auth-check { text-align: center; color: #86868b; padding: 60px 20px; font-size: 14px; }
</style>
</head>
<body>

<header>
  <div class="logo">🇯🇵</div>
  <div>
    <h1>Nihongo Mentor</h1>
    <p>Teacher Onboarding</p>
  </div>
</header>

<div class="container">
  <div id="content">
    <p class="auth-check">Checking authentication…</p>
  </div>
</div>

<script>
const API = 'https://fltusorahxjvsdjaspgy.supabase.co/functions/v1/nihongo-dashboard';
const SUPABASE_URL = 'https://fltusorahxjvsdjaspgy.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZsdHVzb3JhaHhqdnNkamFzcGd5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwNjQ4MzIsImV4cCI6MjA4ODY0MDgzMn0.XW5PMS9F3qsW4hrx6vdO6mev3RTvZALU5Zihn58zQKA'; // TODO: replace with anon key from Supabase dashboard
const sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

async function init() {
  const { data: { session } } = await sbClient.auth.getSession();
  if (!session) {
    window.location.href = 'index.html';
    return;
  }
  renderForm(session);
}

function renderForm(session) {
  document.getElementById('content').innerHTML = `
    <div class="card">
      <div class="setup-icon">🏫</div>
      <h2>Set Up Your Profile</h2>
      <p class="subtitle">Tell us a bit about yourself so students can find your class and you can track their progress.</p>

      <div class="field">
        <label>Your Display Name</label>
        <input id="display-name" type="text" placeholder="e.g. Tanaka Sensei">
      </div>
      <div class="field">
        <label>Organization / School Name</label>
        <input id="org-name" type="text" placeholder="e.g. Sakura Language Academy">
      </div>
      <div class="field">
        <label>Organization Type</label>
        <select id="org-type">
          <option value="">Select…</option>
          <option value="school">School</option>
          <option value="tutoring_center">Tutoring Center</option>
          <option value="individual_tutor">Individual Tutor</option>
        </select>
      </div>

      <button class="submit-btn" id="submit-btn" onclick="submitSetup()">Complete Setup</button>
      <div class="err" id="setup-err"></div>
    </div>`;
}

async function submitSetup() {
  const displayName = document.getElementById('display-name').value.trim();
  const orgName     = document.getElementById('org-name').value.trim();
  const orgType     = document.getElementById('org-type').value;
  const errEl       = document.getElementById('setup-err');
  errEl.style.display = 'none';

  if (!displayName) {
    errEl.textContent = 'Please enter your display name.';
    errEl.style.display = 'block';
    return;
  }
  if (!orgName) {
    errEl.textContent = 'Please enter your organization name.';
    errEl.style.display = 'block';
    return;
  }
  if (!orgType) {
    errEl.textContent = 'Please select an organization type.';
    errEl.style.display = 'block';
    return;
  }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = 'Saving…';

  try {
    const { data: { session } } = await sbClient.auth.getSession();
    if (!session) { window.location.href = 'index.html'; return; }

    const res = await fetch(API + '/teacher-setup', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${session.access_token}`,
      },
      body: JSON.stringify({
        display_name: displayName,
        org_name: orgName,
        org_type: orgType,
      }),
    });

    const data = await res.json();
    if (!res.ok || data.error) {
      errEl.textContent = data.error || 'Setup failed. Please try again.';
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Complete Setup';
      return;
    }

    window.location.href = 'index.html';
  } catch(e) {
    errEl.textContent = 'Network error. Please check your connection and try again.';
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Complete Setup';
  }
}

init();
</script>
</body>
</html>
